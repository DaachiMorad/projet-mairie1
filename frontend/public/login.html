<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaRonde — Connexion</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-50 to-green-100">
<div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-green-600 rounded-2xl mb-4 text-3xl">🗑</div>
    <h1 class="text-2xl font-bold text-gray-900">LaRonde</h1>
    <p class="text-gray-500 text-sm mt-1">Gestion des tournées municipales</p>
  </div>

  <div id="error" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-sm mb-4"></div>

  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input id="email" type="email" placeholder="votre@mairie.fr"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
      <input id="password" type="password" placeholder="••••••••"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
    </div>
    <button id="loginBtn" onclick="login()"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg py-2.5 text-sm transition-colors">
      Se connecter
    </button>
    <p class="text-center text-sm text-gray-500">
      Pas encore de compte ?
      <a href="register.html" class="text-green-700 font-semibold hover:underline">Créer mon espace</a>
    </p>
  </div>
</div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000/api'
  : '/api';

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('error');
  const btn      = document.getElementById('loginBtn');

  err.classList.add('hidden');

  if (!email || !password) {
    err.textContent = 'Veuillez remplir tous les champs.';
    err.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Connexion…';

  // Comptes temporaires (supprimés dès que le backend est lancé)
  const TEMP = {
    'morad.daachi@gmail.com': { password:'Sdis7718', role:'superadmin', name:'Morad Daachi' },
  };

  if (TEMP[email]) {
    const t = TEMP[email];
    if (t.password !== password) {
      err.textContent = 'Identifiants incorrects.';
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }
    sessionStorage.setItem('ub_user', JSON.stringify({ email, ...t }));
    sessionStorage.setItem('sa_secret', 'laronde_superadmin_2024');
    window.location.href = 'superadmin.html';
    return;
  }

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      err.textContent = data.error || 'Identifiants incorrects.';
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }

    sessionStorage.setItem('ub_user', JSON.stringify({
      ...data.user,
      token: data.token,
      mairie: data.user.municipalityName,
      name: `${data.user.firstName} ${data.user.lastName}`,
    }));

    if (data.mustChangePassword) {
      window.location.href = 'change-password.html';
    } else if (data.user.role === 'superadmin') {
      window.location.href = 'superadmin.html';
    } else {
      window.location.href = data.user.role === 'chef' ? 'dashboard.html' : 'agent.html';
    }

  } catch (e) {
    err.textContent = 'Impossible de joindre le serveur.';
    err.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
