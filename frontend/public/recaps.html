<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaRonde — Récapitulatifs</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <div class="flex items-center gap-2"><span class="text-xl">??</span><span class="font-bold text-green-700">LaRonde</span></div>
    <div class="flex gap-1 overflow-x-auto">
      <a href="dashboard.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">?? Dashboard</a>
      <a href="carte.html"      class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">?? Carte</a>
      <a href="vue-agents.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">?? Agents live</a>
      <a href="poubelles.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">?? Poubelles</a>
      <a href="recaps.html"     class="px-3 py-1.5 rounded-lg text-sm font-medium bg-green-50 text-green-700">?? Récaps</a>
      <a href="parametres.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">?? Paramčtres</a>
    </div>
    <a href="login.html" class="text-gray-400 hover:text-red-500 text-sm">? Déco</a>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <h1 class="text-2xl font-bold text-gray-900">Récapitulatifs</h1>
    <div class="flex gap-2 flex-wrap">
      <div class="flex gap-2" id="periodBtns">
        <button onclick="setPeriod('week')"    id="btn-week"    class="text-sm px-4 py-1.5 rounded-lg font-medium bg-green-600 text-white">7 derniers jours</button>
        <button onclick="setPeriod('month')"   id="btn-month"   class="text-sm px-4 py-1.5 rounded-lg font-medium bg-white border border-gray-200 text-gray-600">30 jours</button>
        <button onclick="setPeriod('quarter')" id="btn-quarter" class="text-sm px-4 py-1.5 rounded-lg font-medium bg-white border border-gray-200 text-gray-600">3 mois</button>
      </div>
      <button onclick="exportCSV()" class="flex items-center gap-2 text-sm px-4 py-1.5 rounded-lg font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">
        ? Export CSV
      </button>
    </div>
  </div>

  <!-- KPIs -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="kpis"></div>

  <!-- Chart -->
  <div class="bg-white rounded-xl border border-gray-200 p-5 mb-6">
    <h2 class="font-semibold text-gray-700 mb-4">?? Collectes par jour</h2>
    <div class="flex items-end gap-1 h-40" id="barChart"></div>
    <div class="flex justify-between text-xs text-gray-400 mt-2 px-1" id="chartLabels"></div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
    <!-- Agents -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="font-semibold text-gray-700 mb-4">?? Performance par agent</h2>
      <div id="agentBars"></div>
    </div>
    <!-- Types -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="font-semibold text-gray-700 mb-4">?? Par type de poubelle</h2>
      <div id="typeBars"></div>
    </div>
  </div>

  <!-- Remarques -->
  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <h2 class="font-semibold text-gray-700 mb-4">?? Remarques & incidents</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="remarkCards"></div>
  </div>
</main>

<script>
const user = JSON.parse(sessionStorage.getItem('ub_user') || '{}');
if (!user.role) window.location.href = 'index.html';

if (user.empty) {
  document.querySelector('main').innerHTML = `
    <div class="flex items-center justify-between mb-6"><h1 class="text-2xl font-bold text-gray-900">Récapitulatifs</h1></div>
    <div class="bg-white rounded-xl border border-dashed border-gray-300 p-16 text-center text-gray-400">
      <p class="text-5xl mb-3">??</p>
      <p class="font-semibold text-gray-500 text-lg">Pas encore de données</p>
      <p class="text-sm mt-2">Les statistiques apparaîtront une fois vos premičres tournées effectuées.</p>
    </div>`;
  throw new Error('empty');
}

const DATA = {
  week: {
    total: 119, bins: 24, rate: 71,
    chart: [12, 18, 15, 20, 17, 19, 18],
    labels: ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'],
    agents: [{ name:'Jean Martin', sector:'Centre-ville', count:68 }, { name:'Paul Bernard', sector:'Nord', count:51 }],
    types:  [{ type:'ordures', count:72 }, { type:'recyclable', count:27 }, { type:'verre', count:14 }, { type:'encombrants', count:6 }],
    remarks:[{ type:'Débordante', count:2, status:'ouvert' }, { type:'Dégradée', count:1, status:'en cours' }],
  },
  month: {
    total: 504, bins: 24, rate: 75,
    chart: [16,14,18,17,20,15,19,18,17,16,20,19,18,17,16,20,18,15,17,19,16,14,18,17,20,15,19,18,17,16],
    labels: Array.from({length:30}, (_,i) => i%5===0 ? `J-${30-i}` : ''),
    agents: [{ name:'Jean Martin', sector:'Centre-ville', count:286 }, { name:'Paul Bernard', sector:'Nord', count:218 }],
    types:  [{ type:'ordures', count:304 }, { type:'recyclable', count:112 }, { type:'verre', count:62 }, { type:'encombrants', count:26 }],
    remarks:[{ type:'Débordante', count:7, status:'ouvert' }, { type:'Dégradée', count:4, status:'résolu' }, { type:'Déchirée', count:2, status:'ouvert' }],
  },
  quarter: {
    total: 1512, bins: 24, rate: 75,
    chart: Array.from({length:12}, () => Math.floor(100+Math.random()*60)),
    labels: ['Jan S1','S2','S3','S4','Fév S1','S2','S3','S4','Mar S1','S2','S3','S4'],
    agents: [{ name:'Jean Martin', sector:'Centre-ville', count:858 }, { name:'Paul Bernard', sector:'Nord', count:654 }],
    types:  [{ type:'ordures', count:912 }, { type:'recyclable', count:336 }, { type:'verre', count:186 }, { type:'encombrants', count:78 }],
    remarks:[{ type:'Débordante', count:21, status:'résolu' }, { type:'Dégradée', count:12, status:'résolu' }, { type:'Déchirée', count:6, status:'résolu' }, { type:'Manquante', count:3, status:'résolu' }],
  }
};

const TYPE_COLORS = { ordures:'#6b7280', recyclable:'#3b82f6', verre:'#22c55e', encombrants:'#f97316' };
let currentPeriod = 'week';

function setPeriod(p) {
  currentPeriod = p;
  ['week','month','quarter'].forEach(x => {
    document.getElementById('btn-'+x).className = x===p
      ? 'text-sm px-4 py-1.5 rounded-lg font-medium bg-green-600 text-white'
      : 'text-sm px-4 py-1.5 rounded-lg font-medium bg-white border border-gray-200 text-gray-600';
  });
  render();
}

function render() {
  const d = DATA[currentPeriod];

  // KPIs
  document.getElementById('kpis').innerHTML = [
    { icon:'??', label:'Collectes totales', val:d.total.toLocaleString('fr') },
    { icon:'??', label:'Poubelles actives', val:d.bins },
    { icon:'??', label:'Taux de collecte',  val:d.rate+'%' },
    { icon:'??', label:'Remarques',         val:d.remarks.reduce((s,r)=>s+r.count,0) },
  ].map(k => `
    <div class="bg-white rounded-xl border border-gray-200 p-4">
      <div class="flex items-center gap-2 mb-1 text-gray-500 text-xs">${k.icon} ${k.label}</div>
      <p class="text-2xl font-bold text-gray-900">${k.val}</p>
    </div>
  `).join('');

  // Bar chart
  const maxVal = Math.max(...d.chart);
  document.getElementById('barChart').innerHTML = d.chart.map((v,i) => {
    const h = Math.max(4, Math.round((v/maxVal)*140));
    return `<div class="flex-1 flex flex-col items-center gap-1 group relative">
      <div class="w-full bg-green-400 hover:bg-green-500 rounded-t cursor-default" style="height:${h}px">
        <div class="absolute -top-7 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap z-10">${v}</div>
      </div>
      <span class="text-[9px] text-gray-400">${d.labels[i]||''}</span>
    </div>`;
  }).join('');

  // Agent bars
  const maxAgent = Math.max(...d.agents.map(a=>a.count));
  document.getElementById('agentBars').innerHTML = d.agents.map(a => `
    <div class="mb-4">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-medium text-gray-700">${a.name}</span>
        <span class="text-sm font-bold text-gray-900">${a.count.toLocaleString('fr')}</span>
      </div>
      <div class="h-2 bg-gray-100 rounded-full">
        <div class="h-2 bg-green-500 rounded-full" style="width:${Math.round((a.count/maxAgent)*100)}%"></div>
      </div>
      <p class="text-xs text-gray-400 mt-0.5">${a.sector}</p>
    </div>
  `).join('');

  // Type bars
  const totalTypes = d.types.reduce((s,t)=>s+t.count,0);
  document.getElementById('typeBars').innerHTML = d.types.map(t => {
    const pct = Math.round((t.count/totalTypes)*100);
    return `
    <div class="mb-4">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-medium text-gray-700 capitalize">${t.type}</span>
        <span class="text-sm text-gray-500">${t.count.toLocaleString('fr')} (${pct}%)</span>
      </div>
      <div class="h-2 bg-gray-100 rounded-full">
        <div class="h-2 rounded-full" style="width:${pct}%;background:${TYPE_COLORS[t.type]||'#6b7280'}"></div>
      </div>
    </div>`;
  }).join('');

  // Remarks
  document.getElementById('remarkCards').innerHTML = d.remarks.map(r => `
    <div class="bg-orange-50 rounded-lg p-3">
      <p class="font-semibold text-orange-800">${r.type}</p>
      <p class="text-xs text-orange-600">${r.count}x · ${r.status}</p>
    </div>
  `).join('');
}

render();

function exportCSV() {
  const d = DATA[currentPeriod];
  const periodLabel = { week: '7-jours', month: '30-jours', quarter: '3-mois' }[currentPeriod];
  const today = new Date().toISOString().slice(0, 10);

  // -- Feuille 1 : Collectes par jour ---------------------------------------
  let csv = '?'; // BOM UTF-8 pour Excel
  csv += '=== COLLECTES PAR JOUR ===\r\n';
  csv += 'Jour,Nombre de collectes\r\n';
  d.chart.forEach((v, i) => {
    const label = d.labels[i] || `J${i + 1}`;
    csv += `"${label}",${v}\r\n`;
  });

  csv += '\r\n=== PERFORMANCE PAR AGENT ===\r\n';
  csv += 'Agent,Secteur,Collectes\r\n';
  d.agents.forEach(a => {
    csv += `"${a.name}","${a.sector}",${a.count}\r\n`;
  });

  csv += '\r\n=== RÉPARTITION PAR TYPE ===\r\n';
  csv += 'Type,Collectes,Pourcentage\r\n';
  const totalTypes = d.types.reduce((s, t) => s + t.count, 0);
  d.types.forEach(t => {
    const pct = Math.round((t.count / totalTypes) * 100);
    csv += `"${t.type}",${t.count},${pct}%\r\n`;
  });

  csv += '\r\n=== INCIDENTS & REMARQUES ===\r\n';
  csv += 'Type,Nombre,Statut\r\n';
  d.remarks.forEach(r => {
    csv += `"${r.type}",${r.count},"${r.status}"\r\n`;
  });

  csv += '\r\n=== RÉSUMÉ ===\r\n';
  csv += `Période,${periodLabel}\r\n`;
  csv += `Total collectes,${d.total}\r\n`;
  csv += `Poubelles actives,${d.bins}\r\n`;
  csv += `Taux de collecte,${d.rate}%\r\n`;
  csv += `Exporté le,${today}\r\n`;

  // Téléchargement
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `laronde-recaps-${periodLabel}-${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
