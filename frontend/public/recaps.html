<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaRonde — Récapitulatifs</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <div class="flex items-center gap-2"><span class="text-xl">🗑</span><span class="font-bold text-green-700">LaRonde</span></div>
    <div class="flex gap-1 overflow-x-auto">
      <a href="dashboard.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">📊 Dashboard</a>
      <a href="carte.html"      class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">🗺 Carte</a>
      <a href="vue-agents.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">👥 Agents live</a>
      <a href="poubelles.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">🗑 Poubelles</a>
      <a href="recaps.html"     class="px-3 py-1.5 rounded-lg text-sm font-medium bg-green-50 text-green-700">📈 Récaps</a>
      <a href="parametres.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">⚙️ Paramètres</a>
    </div>
    <a href="login.html" class="text-gray-400 hover:text-red-500 text-sm">⬅ Déco</a>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <h1 class="text-2xl font-bold text-gray-900">Récapitulatifs</h1>
    <div class="flex gap-2 flex-wrap">
      <div class="flex gap-2" id="periodBtns">
        <button onclick="setPeriod('week')"    id="btn-week"    class="text-sm px-4 py-1.5 rounded-lg font-medium bg-green-600 text-white">7 derniers jours</button>
        <button onclick="setPeriod('month')"   id="btn-month"   class="text-sm px-4 py-1.5 rounded-lg font-medium bg-white border border-gray-200 text-gray-600">30 jours</button>
        <button onclick="setPeriod('quarter')" id="btn-quarter" class="text-sm px-4 py-1.5 rounded-lg font-medium bg-white border border-gray-200 text-gray-600">3 mois</button>
      </div>
      <button onclick="exportCSV()" class="flex items-center gap-2 text-sm px-4 py-1.5 rounded-lg font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">
        ⬇ Export CSV
      </button>
    </div>
  </div>

  <!-- KPIs -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="kpis"></div>

  <!-- Chart -->
  <div class="bg-white rounded-xl border border-gray-200 p-5 mb-6">
    <h2 class="font-semibold text-gray-700 mb-4">📊 Collectes par jour</h2>
    <div class="flex items-end gap-1 h-40" id="barChart"></div>
    <div class="flex justify-between text-xs text-gray-400 mt-2 px-1" id="chartLabels"></div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
    <!-- Agents -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="font-semibold text-gray-700 mb-4">👥 Performance par agent</h2>
      <div id="agentBars"></div>
    </div>
    <!-- Types -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="font-semibold text-gray-700 mb-4">🗑 Par type de poubelle</h2>
      <div id="typeBars"></div>
    </div>
  </div>

  <!-- Remarques -->
  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <h2 class="font-semibold text-gray-700 mb-4">⚠️ Remarques & incidents</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="remarkCards"></div>
  </div>
</main>

<script>
const API = 'https://projet-mairie1-production.up.railway.app/api';
const user = JSON.parse(sessionStorage.getItem('ub_user') || '{}');
if (!user.role || !user.token) window.location.href = 'login.html';
const HEADERS = { 'Authorization': `Bearer ${user.token}` };

const TYPE_COLORS = { ordures:'#6b7280', recyclable:'#3b82f6', verre:'#22c55e', encombrants:'#f97316' };
const JOURS_COURT = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
let currentPeriod = 'week';
let currentData = null;

function setPeriod(p) {
  currentPeriod = p;
  ['week','month','quarter'].forEach(x => {
    document.getElementById('btn-'+x).className = x===p
      ? 'text-sm px-4 py-1.5 rounded-lg font-medium bg-green-600 text-white'
      : 'text-sm px-4 py-1.5 rounded-lg font-medium bg-white border border-gray-200 text-gray-600';
  });
  load();
}

async function load() {
  try {
    const res = await fetch(`${API}/reports/recap?period=${currentPeriod}`, { headers: HEADERS });
    if (!res.ok) throw new Error(res.status);
    currentData = await res.json();
    render();
  } catch {
    currentData = null;
    renderEmpty();
  }
}

function renderEmpty() {
  document.getElementById('kpis').innerHTML = [
    { icon:'📈', label:'Collectes totales', val:'0' },
    { icon:'🗑', label:'Poubelles actives', val:'0' },
    { icon:'📊', label:'Taux de collecte',  val:'0%' },
    { icon:'⚠️', label:'Remarques',         val:'0' },
  ].map(k => `
    <div class="bg-white rounded-xl border border-gray-200 p-4">
      <div class="flex items-center gap-2 mb-1 text-gray-500 text-xs">${k.icon} ${k.label}</div>
      <p class="text-2xl font-bold text-gray-900">${k.val}</p>
    </div>
  `).join('');
  const empty = '<p class="text-sm text-gray-400 text-center py-6">Aucune donnée pour cette période</p>';
  document.getElementById('barChart').innerHTML = '';
  document.getElementById('chartLabels').innerHTML = '';
  document.getElementById('agentBars').innerHTML = empty;
  document.getElementById('typeBars').innerHTML = empty;
  document.getElementById('remarkCards').innerHTML = '<p class="text-sm text-gray-400 col-span-4 text-center py-4">Aucune remarque</p>';
}

function dayLabel(dayStr) {
  const d = new Date(dayStr + 'T00:00:00');
  if (currentPeriod === 'week') return JOURS_COURT[d.getDay()];
  if (currentPeriod === 'month') return String(d.getDate());
  return d.getDate() + ' ' + d.toLocaleDateString('fr-FR', { month:'short' });
}

function render() {
  if (!currentData) { renderEmpty(); return; }
  const d = currentData;

  // KPIs
  const remarkTotal = (d.remarks || []).reduce((s, r) => s + r.count, 0);
  document.getElementById('kpis').innerHTML = [
    { icon:'📈', label:'Collectes totales', val: Number(d.totalCollections).toLocaleString('fr') },
    { icon:'🗑', label:'Poubelles actives', val: d.totalBins },
    { icon:'📊', label:'Taux de collecte',  val: d.collectionRate + '%' },
    { icon:'⚠️', label:'Remarques',         val: remarkTotal },
  ].map(k => `
    <div class="bg-white rounded-xl border border-gray-200 p-4">
      <div class="flex items-center gap-2 mb-1 text-gray-500 text-xs">${k.icon} ${k.label}</div>
      <p class="text-2xl font-bold text-gray-900">${k.val}</p>
    </div>
  `).join('');

  // Bar chart
  const chart = d.dailyChart || [];
  if (chart.length) {
    const maxVal = Math.max(...chart.map(c => c.count), 1);
    document.getElementById('barChart').innerHTML = chart.map(c => {
      const h = Math.max(4, Math.round((c.count / maxVal) * 140));
      return `<div class="flex-1 flex flex-col items-center gap-1 group relative">
        <div class="w-full bg-green-400 hover:bg-green-500 rounded-t cursor-default" style="height:${h}px">
          <div class="absolute -top-7 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap z-10">${c.count}</div>
        </div>
        <span class="text-[9px] text-gray-400">${dayLabel(c.day)}</span>
      </div>`;
    }).join('');
    document.getElementById('chartLabels').innerHTML = '';
  } else {
    document.getElementById('barChart').innerHTML = '<p class="text-sm text-gray-400 w-full text-center self-center py-10">Aucune collecte sur cette période</p>';
    document.getElementById('chartLabels').innerHTML = '';
  }

  // Agent bars
  const agents = d.byAgent || [];
  const maxAgent = Math.max(...agents.map(a => a.count), 1);
  document.getElementById('agentBars').innerHTML = agents.length
    ? agents.map(a => `
      <div class="mb-4">
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm font-medium text-gray-700">${a.firstName} ${a.lastName}</span>
          <span class="text-sm font-bold text-gray-900">${Number(a.count).toLocaleString('fr')}</span>
        </div>
        <div class="h-2 bg-gray-100 rounded-full">
          <div class="h-2 bg-green-500 rounded-full" style="width:${Math.round((a.count/maxAgent)*100)}%"></div>
        </div>
        <p class="text-xs text-gray-400 mt-0.5">${a.sector || '—'}</p>
      </div>
    `).join('')
    : '<p class="text-sm text-gray-400 text-center py-6">Aucune collecte enregistrée</p>';

  // Type bars
  const types = d.byType || [];
  const totalTypes = types.reduce((s,t) => s + t.count, 0);
  document.getElementById('typeBars').innerHTML = types.length
    ? types.map(t => {
        const pct = totalTypes > 0 ? Math.round((t.count / totalTypes) * 100) : 0;
        return `
        <div class="mb-4">
          <div class="flex items-center justify-between mb-1">
            <span class="text-sm font-medium text-gray-700 capitalize">${t.type}</span>
            <span class="text-sm text-gray-500">${Number(t.count).toLocaleString('fr')} (${pct}%)</span>
          </div>
          <div class="h-2 bg-gray-100 rounded-full">
            <div class="h-2 rounded-full" style="width:${pct}%;background:${TYPE_COLORS[t.type]||'#6b7280'}"></div>
          </div>
        </div>`;
      }).join('')
    : '<p class="text-sm text-gray-400 text-center py-6">Aucune donnée</p>';

  // Remarks
  const remarks = d.remarks || [];
  document.getElementById('remarkCards').innerHTML = remarks.length
    ? remarks.map(r => `
      <div class="bg-orange-50 rounded-lg p-3">
        <p class="font-semibold text-orange-800">${r.type}</p>
        <p class="text-xs text-orange-600">${r.count}x · ${r.status}</p>
      </div>
    `).join('')
    : '<p class="text-sm text-gray-400 col-span-4 text-center py-4">Aucune remarque pour cette période</p>';
}

load();

function exportCSV() {
  if (!currentData) return;
  const d = currentData;
  const periodLabel = { week: '7-jours', month: '30-jours', quarter: '3-mois' }[currentPeriod];
  const today = new Date().toISOString().slice(0, 10);

  let csv = '﻿';
  csv += '=== COLLECTES PAR JOUR ===\r\n';
  csv += 'Jour,Nombre de collectes\r\n';
  (d.dailyChart || []).forEach(c => { csv += `"${c.day}",${c.count}\r\n`; });

  csv += '\r\n=== PERFORMANCE PAR AGENT ===\r\n';
  csv += 'Agent,Secteur,Collectes\r\n';
  (d.byAgent || []).forEach(a => { csv += `"${a.firstName} ${a.lastName}","${a.sector||''}",${a.count}\r\n`; });

  csv += '\r\n=== RÉPARTITION PAR TYPE ===\r\n';
  csv += 'Type,Collectes\r\n';
  (d.byType || []).forEach(t => { csv += `"${t.type}",${t.count}\r\n`; });

  csv += '\r\n=== INCIDENTS & REMARQUES ===\r\n';
  csv += 'Type,Nombre,Statut\r\n';
  (d.remarks || []).forEach(r => { csv += `"${r.type}",${r.count},"${r.status}"\r\n`; });

  csv += '\r\n=== RÉSUMÉ ===\r\n';
  csv += `Période,${periodLabel}\r\n`;
  csv += `Total collectes,${d.totalCollections}\r\n`;
  csv += `Poubelles actives,${d.totalBins}\r\n`;
  csv += `Taux de collecte,${d.collectionRate}%\r\n`;
  csv += `Exporté le,${today}\r\n`;

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `laronde-recaps-${periodLabel}-${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
