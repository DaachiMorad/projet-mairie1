<!DOCTYPE html>
<html>
<head><title>Générer icônes PWA</title></head>
<body>
<p>Génération des icônes en cours...</p>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
async function generate() {
  const svgText = await fetch('icon.svg').then(r => r.text());
  const blob = new Blob([svgText], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    [192, 512].forEach(size => {
      const canvas = document.getElementById('c' + size);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.textContent = `⬇ Télécharger icon-${size}.png`;
      link.style = 'display:block;margin:10px;font-size:18px;color:green;font-family:sans-serif';
      document.body.appendChild(link);
      link.click();
    });
    document.body.innerHTML += '<p style="font-family:sans-serif;color:green;font-weight:bold">✅ Téléchargé ! Placez les deux fichiers dans le dossier  puis fermez cette page.</p>';
    URL.revokeObjectURL(url);
  };
  img.src = url;
}
generate();
</script>
</body>
</html>
