<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LaRonde — Agent</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LaRonde">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Banner installation PWA -->
<div id="installBanner" class="hidden fixed bottom-0 left-0 right-0 z-50 bg-green-800 text-white px-4 py-3 flex items-center justify-between max-w-lg mx-auto shadow-2xl">
  <div>
    <p class="font-semibold text-sm">📲 Installer LaRonde</p>
    <p class="text-green-200 text-xs">Accès rapide depuis votre écran d'accueil</p>
  </div>
  <div class="flex gap-2">
    <button onclick="document.getElementById('installBanner').classList.add('hidden')" class="text-green-300 text-xs px-3 py-1.5">Plus tard</button>
    <button onclick="installApp()" class="bg-white text-green-700 font-bold text-sm px-4 py-1.5 rounded-lg">Installer</button>
  </div>
</div>

<!-- Header agent -->
<div class="bg-green-700 text-white px-4 py-4 max-w-lg mx-auto">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="font-bold text-lg">LaRonde</h1>
      <p class="text-green-200 text-sm" id="agentName">Jean Martin</p>
      <p id="onlineStatus" class="text-xs text-green-200">🟢 En ligne</p>
    </div>
    <div class="text-right">
      <p class="font-bold text-2xl" id="pctHeader">77%</p>
      <p class="text-green-200 text-xs" id="countHeader">10/13 collectées</p>
    </div>
  </div>
  <div class="mt-3 bg-green-600 rounded-full h-2">
    <div id="progressBar" class="bg-white h-2 rounded-full transition-all duration-500" style="width:77%"></div>
  </div>
</div>

<!-- Tabs -->
<div class="flex bg-white border-b border-gray-200 max-w-lg mx-auto sticky top-0 z-10">
  <button onclick="setTab('todo')"     id="tab-todo"     class="flex-1 py-3 text-xs font-medium text-green-700 border-b-2 border-green-600">À faire <span id="badge-todo" class="ml-1 px-1.5 py-0.5 rounded-full text-xs bg-green-100 text-green-700">3</span></button>
  <button onclick="setTab('done')"     id="tab-done"     class="flex-1 py-3 text-xs font-medium text-gray-500">Déjà fait <span id="badge-done" class="ml-1 px-1.5 py-0.5 rounded-full text-xs bg-gray-100 text-gray-500">10</span></button>
  <button onclick="setTab('progress')" id="tab-progress" class="flex-1 py-3 text-xs font-medium text-gray-500">Progression</button>
  <button onclick="setTab('remark')"   id="tab-remark"   class="flex-1 py-3 text-xs font-medium text-gray-500">Remarque</button>
</div>

<div class="max-w-lg mx-auto p-4" id="content"></div>

<!-- Modale confirmation -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-end z-50">
  <div class="bg-white w-full max-w-lg mx-auto rounded-t-2xl p-6">
    <h2 class="font-bold text-lg mb-2">Confirmer la collecte</h2>
    <p class="text-gray-600 text-sm mb-1" id="modalAddr"></p>
    <p class="text-gray-400 text-sm mb-4" id="modalNeighborhood"></p>
    <p class="text-sm text-gray-500 mb-5">📍 Votre position GPS sera vérifiée automatiquement.</p>
    <div class="flex gap-3">
      <button onclick="closeModal()" class="flex-1 border border-gray-300 text-gray-700 rounded-xl py-3 font-medium">Annuler</button>
      <button onclick="confirmCollect()" id="confirmBtn" class="flex-1 bg-green-600 text-white rounded-xl py-3 font-medium flex items-center justify-center gap-2">
        ✅ Marquer vidée
      </button>
    </div>
  </div>
</div>

<script>
const API = 'https://projet-mairie1-production.up.railway.app/api';
function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
const user = JSON.parse(sessionStorage.getItem('ub_user') || '{}');
if (!user.role || !user.token) window.location.href = 'login.html';
const HEADERS = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${user.token}` };

document.getElementById('agentName').textContent = user.name || '';

let bins = [];
let currentTab = 'todo';
let pendingBinId = null;

const REMARK_TYPES = ['dechire','degrade','debordant','manquant','autre'];
const REMARK_LABELS = { dechire:'Déchirée', degrade:'Dégradée', debordant:'Débordante', manquant:'Manquante', autre:'Autre' };

async function load() {
  try {
    const res = await fetch(`${API}/collections/stats/map`, { headers: HEADERS });
    const data = res.ok ? await res.json() : [];
    bins = data.map(b => ({
      ...b,
      collected: !!b.collectedToday,
      time: b.collectedAt ? new Date(b.collectedAt).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) : null,
    }));
  } catch { bins = []; }
  updateHeader();
  render();
}

function updateHeader() {
  const done = bins.filter(b => b.collected).length;
  const total = bins.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('pctHeader').textContent = pct + '%';
  document.getElementById('countHeader').textContent = done + '/' + total + ' collectées';
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('badge-todo').textContent = bins.filter(b => !b.collected).length;
  document.getElementById('badge-done').textContent = done;
}

function setTab(tab) {
  currentTab = tab;
  ['todo','done','progress','remark'].forEach(t => {
    document.getElementById('tab-'+t).className = t === tab
      ? 'flex-1 py-3 text-xs font-medium text-green-700 border-b-2 border-green-600'
      : 'flex-1 py-3 text-xs font-medium text-gray-500';
  });
  render();
}

function openModal(id) {
  pendingBinId = id;
  const bin = bins.find(b => b.id === id);
  document.getElementById('modalAddr').textContent = bin.address;
  document.getElementById('modalNeighborhood').textContent = bin.neighborhood || '';
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  pendingBinId = null;
}

async function confirmCollect() {
  const btn = document.getElementById('confirmBtn');
  btn.textContent = '📍 Vérification GPS...';
  btn.disabled = true;

  let gpsLatitude = null, gpsLongitude = null, gpsAccuracy = null;
  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 })
    );
    gpsLatitude = pos.coords.latitude;
    gpsLongitude = pos.coords.longitude;
    gpsAccuracy = pos.coords.accuracy;
  } catch {}

  try {
    const res = await fetch(`${API}/collections`, {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ binId: pendingBinId, gpsLatitude, gpsLongitude, gpsAccuracy }),
    });
    const bin = bins.find(b => b.id === pendingBinId);
    if (bin) {
      bin.collected = true;
      bin.time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    }
    if (!res.ok && res.status !== 409) {
      const err = await res.json().catch(() => ({}));
      showToast('Erreur : ' + (err.error || 'Serveur indisponible'));
    }
  } catch {
    const bin = bins.find(b => b.id === pendingBinId);
    if (bin) {
      bin.collected = true;
      bin.time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      bin.offline = true;
    }
    showToast('🔴 Hors ligne — collecte sauvegardée localement');
    saveOfflineCollect(pendingBinId);
  }

  closeModal();
  btn.innerHTML = '✅ Marquer vidée';
  btn.disabled = false;
  updateHeader();
  render();
}

function saveOfflineCollect(binId) {
  const pending = JSON.parse(localStorage.getItem('laronde_offline_collects') || '[]');
  pending.push({ binId, collectedAt: new Date().toISOString() });
  localStorage.setItem('laronde_offline_collects', JSON.stringify(pending));
}

function render() {
  const todo = bins.filter(b => !b.collected);
  const done = bins.filter(b => b.collected);
  const total = bins.length;
  const pct = total > 0 ? Math.round((done.length / total) * 100) : 0;

  if (currentTab === 'todo') {
    if (!total) {
      document.getElementById('content').innerHTML = `
        <div class="text-center py-16">
          <div class="text-5xl mb-3">📋</div>
          <p class="text-gray-500 font-medium">Aucune poubelle assignée</p>
          <p class="text-gray-400 text-sm mt-1">Contactez votre chef pour recevoir une tournée.</p>
        </div>`;
    } else if (!todo.length) {
      document.getElementById('content').innerHTML = `
        <div class="text-center py-16">
          <div class="text-5xl mb-3">🎉</div>
          <p class="text-gray-500 font-medium">Tournée terminée !</p>
          <p class="text-gray-400 text-sm mt-1">Toutes les poubelles ont été collectées</p>
        </div>`;
    } else {
      document.getElementById('content').innerHTML = todo.map(bin => `
        <div class="bg-white rounded-xl border border-gray-200 p-4 mb-3">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <p class="font-medium text-gray-800 text-sm">${esc(bin.address)}</p>
              <p class="text-xs text-gray-400 mt-0.5">${esc(bin.neighborhood || '')}</p>
              <span class="inline-block mt-1 text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${esc(bin.type)}</span>
            </div>
            <button onclick="openModal('${bin.id}')" class="shrink-0 bg-green-600 hover:bg-green-700 text-white text-xs font-semibold px-3 py-2 rounded-lg flex items-center gap-1">
              Collecter ▶
            </button>
          </div>
        </div>
      `).join('');
    }
  }

  else if (currentTab === 'done') {
    document.getElementById('content').innerHTML = done.length === 0
      ? `<p class="text-center text-gray-400 py-12">Aucune collecte pour l'instant</p>`
      : done.map(bin => `
        <div class="bg-white rounded-xl border border-green-100 p-4 mb-2 flex items-center gap-3">
          <span class="text-xl shrink-0">✅</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-700 truncate">${esc(bin.address)}</p>
            <p class="text-xs text-gray-400">${esc(bin.neighborhood || '')}</p>
          </div>
          <span class="text-xs text-gray-500 font-mono shrink-0">${esc(bin.time || '')}</span>
        </div>
      `).join('');
  }

  else if (currentTab === 'progress') {
    document.getElementById('content').innerHTML = `
      <div class="bg-white rounded-xl border border-gray-200 p-5 mb-4">
        <p class="text-sm text-gray-500 mb-1">Progression totale</p>
        <p class="text-4xl font-bold text-green-600">${pct}%</p>
        <div class="mt-3 bg-gray-100 rounded-full h-3">
          <div class="bg-green-500 h-3 rounded-full transition-all" style="width:${pct}%"></div>
        </div>
        <p class="text-sm text-gray-500 mt-2">${done.length} / ${total} poubelles</p>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
          <div class="text-2xl mb-1">⏳</div>
          <p class="text-2xl font-bold text-gray-800">${todo.length}</p>
          <p class="text-xs text-gray-400">Restantes</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
          <div class="text-2xl mb-1">✅</div>
          <p class="text-2xl font-bold text-gray-800">${done.length}</p>
          <p class="text-xs text-gray-400">Collectées</p>
        </div>
      </div>
    `;
  }

  else if (currentTab === 'remark') {
    document.getElementById('content').innerHTML = `
      <p class="text-sm text-gray-500 mb-3">Signaler un problème sur une poubelle</p>
      <div class="bg-white rounded-xl border border-gray-200 p-4 space-y-3">
        <div>
          <label class="text-xs font-medium text-gray-600 mb-1 block">Poubelle</label>
          <select class="inp" id="remarkBin">
            <option value="">-- Choisir --</option>
            ${bins.map(b => `<option value="${esc(b.id)}">${esc(b.address)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 mb-1 block">Type de problème</label>
          <select class="inp" id="remarkType">
            ${REMARK_TYPES.map(t => `<option value="${t}">${REMARK_LABELS[t]}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 mb-1 block">Description (optionnel)</label>
          <textarea class="inp resize-none" id="remarkDesc" rows="3" placeholder="Décrivez le problème..."></textarea>
        </div>
        <button onclick="submitRemark()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 rounded-lg text-sm">
          ⚠️ Signaler
        </button>
      </div>
    `;
  }
}

async function submitRemark() {
  const binId = document.getElementById('remarkBin').value;
  if (!binId) { alert('Sélectionne une poubelle'); return; }
  const type = document.getElementById('remarkType').value;
  const description = document.getElementById('remarkDesc').value.trim();

  try {
    const res = await fetch(`${API}/remarks`, {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ binId, type, description }),
    });
    if (!res.ok) throw new Error();
    document.getElementById('content').innerHTML = `
      <div class="bg-orange-50 border border-orange-200 rounded-xl p-5 text-center">
        <div class="text-3xl mb-2">✅</div>
        <p class="font-semibold text-orange-800">Remarque envoyée !</p>
        <p class="text-sm text-orange-600 mt-1">Le chef a été notifié.</p>
        <button onclick="setTab('remark')" class="mt-4 text-sm text-orange-700 underline">Signaler un autre problème</button>
      </div>
    `;
  } catch {
    showToast('Erreur lors de l\'envoi de la remarque');
  }
}

load();

// ── PWA : Service Worker ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log('[PWA] Service Worker enregistré', reg.scope);

    // Écouter les messages de sync depuis le SW
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'SYNC_SUCCESS') {
        showToast('✅ Collecte synchronisée hors-ligne : ' + (e.data.payload?.binId || ''));
      }
    });
  }).catch(err => console.error('[PWA] SW erreur :', err));
}

// ── PWA : Bouton "Installer l'app" ──────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.remove('hidden');
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    if (choice.outcome === 'accepted') {
      document.getElementById('installBanner').classList.add('hidden');
    }
    deferredPrompt = null;
  });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.add('hidden');
});

// ── Indicateur connexion ──────────────────────────────────────────────────────
function updateOnlineStatus() {
  const el = document.getElementById('onlineStatus');
  if (!el) return;
  if (navigator.onLine) {
    el.textContent = '🟢 En ligne';
    el.className = 'text-xs text-green-200';
    // Tenter sync des collectes offline
    if ('serviceWorker' in navigator && 'SyncManager' in window) {
      navigator.serviceWorker.ready.then(sw => sw.sync.register('sync-collections'));
    }
  } else {
    el.textContent = '🔴 Hors ligne — collectes sauvegardées';
    el.className = 'text-xs text-orange-300 font-semibold';
  }
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-xl shadow-lg z-50';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
<style>
.inp { border:1px solid #d1d5db; border-radius:0.5rem; padding:0.5rem 0.75rem; font-size:0.875rem; width:100%; outline:none; }
.inp:focus { border-color:#16a34a; box-shadow:0 0 0 2px rgba(22,163,74,0.2); }
</style>
</body>
</html>
