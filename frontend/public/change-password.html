<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaRonde — Choisir mon mot de passe</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { font-family:'Inter',sans-serif; }
  .inp { width:100%; border:1.5px solid #e5e7eb; border-radius:10px; padding:11px 14px; font-size:14px; outline:none; transition:border-color .15s,box-shadow .15s; }
  .inp:focus { border-color:#16a34a; box-shadow:0 0 0 3px rgba(22,163,74,.12); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-50 to-green-100 px-4">

<div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-green-600 rounded-2xl mb-4 text-3xl">🔒</div>
    <h1 class="text-xl font-bold text-gray-900">Choisissez votre mot de passe</h1>
    <p class="text-gray-500 text-sm mt-2">Pour des raisons de sécurité, vous devez définir un nouveau mot de passe avant de continuer.</p>
  </div>

  <div id="error" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-sm mb-4"></div>

  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Nouveau mot de passe</label>
      <input id="pwd1" type="password" placeholder="Minimum 8 caractères" class="inp">
      <div class="mt-2 h-1.5 bg-gray-100 rounded-full overflow-hidden">
        <div id="pwdBar" class="h-full rounded-full transition-all duration-300 w-0"></div>
      </div>
      <p id="pwdHint" class="text-xs text-gray-400 mt-1">Entrez un mot de passe</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirmer le mot de passe</label>
      <input id="pwd2" type="password" placeholder="Répétez le mot de passe" class="inp">
    </div>

    <button id="btn" onclick="submit()"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-sm transition-colors">
      Valider et accéder à mon espace →
    </button>
  </div>
</div>

<script>
const API = 'https://projet-mairie1-production.up.railway.app/api';

const user = JSON.parse(sessionStorage.getItem('ub_user') || '{}');
if (!user.email) window.location.href = 'login.html';
const isTempAccount = !user.token;

// Force meter
document.getElementById('pwd1').addEventListener('input', function () {
  const v = this.value;
  const bar = document.getElementById('pwdBar');
  const hint = document.getElementById('pwdHint');
  let score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const levels = [
    { w:'0%',   color:'',              label:'Entrez un mot de passe' },
    { w:'25%',  color:'bg-red-400',    label:'Trop court' },
    { w:'50%',  color:'bg-orange-400', label:'Faible' },
    { w:'75%',  color:'bg-yellow-400', label:'Correct' },
    { w:'90%',  color:'bg-green-400',  label:'Bon' },
    { w:'100%', color:'bg-green-600',  label:'Excellent' },
  ];
  const l = levels[Math.min(score, 5)];
  bar.style.width = l.w;
  bar.className = `h-full rounded-full transition-all duration-300 ${l.color}`;
  hint.textContent = l.label;
});

async function submit() {
  const pwd1 = document.getElementById('pwd1').value;
  const pwd2 = document.getElementById('pwd2').value;
  const err  = document.getElementById('error');
  const btn  = document.getElementById('btn');

  err.classList.add('hidden');

  if (pwd1.length < 8) {
    err.textContent = 'Le mot de passe doit faire au moins 8 caractères.';
    return err.classList.remove('hidden');
  }
  if (pwd1 !== pwd2) {
    err.textContent = 'Les mots de passe ne correspondent pas.';
    return err.classList.remove('hidden');
  }

  btn.disabled = true;
  btn.textContent = '⏳ Enregistrement…';

  // Compte temporaire (pas de backend) — on met juste à jour la session
  if (isTempAccount) {
    const updated = { ...user, mustChangePassword: false, password: pwd1 };
    sessionStorage.setItem('ub_user', JSON.stringify(updated));
    setTimeout(() => window.location.href = user.role === 'chef' ? 'dashboard.html' : 'agent.html', 400);
    return;
  }

  try {
    const res = await fetch(`${API}/auth/change-password`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${user.token}`,
      },
      body: JSON.stringify({ newPassword: pwd1 }),
    });

    if (!res.ok) {
      const d = await res.json();
      err.textContent = d.error || 'Erreur serveur.';
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Valider et accéder à mon espace →';
      return;
    }

    const updated = { ...user, mustChangePassword: false };
    sessionStorage.setItem('ub_user', JSON.stringify(updated));
    window.location.href = user.role === 'chef' ? 'dashboard.html' : 'agent.html';

  } catch (e) {
    err.textContent = 'Impossible de joindre le serveur.';
    err.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Valider et accéder à mon espace →';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
