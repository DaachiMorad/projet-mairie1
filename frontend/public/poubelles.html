<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaRonde — Poubelles</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <div class="flex items-center gap-2"><span class="text-xl">🗑</span><span class="font-bold text-green-700">LaRonde</span></div>
    <div class="flex gap-1 overflow-x-auto">
      <a href="dashboard.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">📊 Dashboard</a>
      <a href="carte.html"      class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">🗺 Carte</a>
      <a href="vue-agents.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">👥 Agents live</a>
      <a href="poubelles.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium bg-green-50 text-green-700">🗑 Poubelles</a>
      <a href="recaps.html"     class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">📈 Récaps</a>
      <a href="parametres.html"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">⚙️ Paramètres</a>
    </div>
    <a href="login.html" class="text-gray-400 hover:text-red-500 text-sm">⬅ Déco</a>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Poubelles <span class="text-gray-400 font-normal text-lg" id="countLabel">(24)</span></h1>
    <div class="flex gap-2">
      <button onclick="exportCSV()" class="flex items-center gap-2 bg-white border border-gray-200 hover:bg-gray-50 text-gray-600 text-sm font-medium px-4 py-2 rounded-lg transition-colors">
        ⬇ Export CSV
      </button>
      <button onclick="toggleForm()" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg">
        ➕ Ajouter
      </button>
    </div>
  </div>

  <!-- Formulaire -->
  <div id="addForm" class="hidden bg-white rounded-xl border border-gray-200 p-5 mb-6">
    <h2 class="font-semibold mb-4">Ajouter une poubelle</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <input id="f-address" placeholder="Adresse complète *" class="inp md:col-span-2">
      <input id="f-neighborhood" placeholder="Quartier" class="inp">
      <input id="f-sector" placeholder="Secteur" class="inp">
      <input id="f-lat" placeholder="Latitude (ex: 48.8566)" class="inp">
      <input id="f-lng" placeholder="Longitude (ex: 2.3522)" class="inp">
      <select id="f-type" class="inp">
        <option>ordures</option><option>recyclable</option><option>verre</option><option>encombrants</option><option>autre</option>
      </select>
      <select id="f-agent" class="inp">
        <option value="">-- Assigner un agent --</option>
      </select>
    </div>
    <div class="flex justify-end gap-2 mt-4">
      <button onclick="toggleForm()" class="px-4 py-2 text-sm border border-gray-300 rounded-lg">Annuler</button>
      <button onclick="addBin()" class="px-4 py-2 text-sm bg-green-600 text-white rounded-lg">Ajouter</button>
    </div>
  </div>

  <!-- Filtres -->
  <div class="flex gap-2 mb-4">
    <input id="searchInput" oninput="filterBins()" placeholder="Rechercher..." class="inp w-64">
    <select id="typeFilter" onchange="filterBins()" class="inp w-40">
      <option value="">Tous les types</option>
      <option>ordures</option><option>recyclable</option><option>verre</option><option>encombrants</option>
    </select>
  </div>

  <!-- Liste -->
  <div class="bg-white rounded-xl border border-gray-200 divide-y divide-gray-100" id="binList"></div>
</main>

<div id="toast" class="fixed bottom-4 right-4 z-50 hidden bg-green-600 text-white px-4 py-2 rounded-lg text-sm shadow-lg"></div>

<script>
const API = 'https://projet-mairie1-production.up.railway.app/api';
function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
const user = JSON.parse(sessionStorage.getItem('ub_user') || '{}');
if (!user.role || !user.token) window.location.href = 'login.html';

const HEADERS = { 'Content-Type':'application/json', 'Authorization': `Bearer ${user.token}` };
const TYPE_COLORS = { ordures:'bg-gray-100 text-gray-700', recyclable:'bg-blue-100 text-blue-700', verre:'bg-green-100 text-green-700', encombrants:'bg-orange-100 text-orange-700', autre:'bg-purple-100 text-purple-700' };

let BINS = [];

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

function toggleForm() { document.getElementById('addForm').classList.toggle('hidden'); }

async function loadAgents() {
  try {
    const res = await fetch(`${API}/auth/agents`, { headers: HEADERS });
    const agents = res.ok ? await res.json() : [];
    const sel = document.getElementById('f-agent');
    sel.innerHTML = '<option value="">-- Assigner un agent --</option>' +
      agents.map(a => `<option value="${a.id}">${a.firstName} ${a.lastName}</option>`).join('');
  } catch {}
}

async function loadBins() {
  try {
    const res = await fetch(`${API}/bins`, { headers: HEADERS });
    BINS = res.ok ? await res.json() : [];
    renderBins(BINS);
  } catch {
    renderBins([]);
  }
}

async function addBin() {
  const address = document.getElementById('f-address').value.trim();
  if (!address) { alert('Adresse obligatoire'); return; }
  const body = {
    address,
    neighborhood: document.getElementById('f-neighborhood').value || '',
    sector:       document.getElementById('f-sector').value || '',
    latitude:     parseFloat(document.getElementById('f-lat').value) || null,
    longitude:    parseFloat(document.getElementById('f-lng').value) || null,
    type:         document.getElementById('f-type').value,
    assignedUserId: document.getElementById('f-agent').value || null,
  };
  try {
    const res = await fetch(`${API}/bins`, { method:'POST', headers: HEADERS, body: JSON.stringify(body) });
    if (!res.ok) { const d = await res.json(); alert(d.error || 'Erreur'); return; }
    document.getElementById('f-address').value = '';
    document.getElementById('f-neighborhood').value = '';
    document.getElementById('f-sector').value = '';
    document.getElementById('f-lat').value = '';
    document.getElementById('f-lng').value = '';
    toggleForm();
    toast('✅ Poubelle ajoutée');
    loadBins();
  } catch { alert('Impossible de contacter le serveur'); }
}

async function archiveBin(id) {
  if (!confirm('Archiver cette poubelle ?')) return;
  try {
    await fetch(`${API}/bins/${id}`, { method:'DELETE', headers: HEADERS });
    toast('📦 Poubelle archivée');
    loadBins();
  } catch { alert('Erreur'); }
}

function filterBins() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const type   = document.getElementById('typeFilter').value;
  renderBins(BINS.filter(b =>
    (!search || b.address.toLowerCase().includes(search) || (b.neighborhood||'').toLowerCase().includes(search)) &&
    (!type   || b.type === type)
  ));
}

function renderBins(list) {
  document.getElementById('countLabel').textContent = `(${BINS.length})`;
  document.getElementById('binList').innerHTML = list.length === 0
    ? '<div class="p-10 text-center text-gray-400">Aucune poubelle configurée</div>'
    : list.map(b => `
      <div class="flex items-center justify-between px-5 py-3 gap-3">
        <div class="flex-1 min-w-0">
          <p class="font-medium text-gray-800 truncate">${esc(b.address)}</p>
          <p class="text-sm text-gray-400">${esc(b.neighborhood || '—')} · ${esc(b.sector || '—')} · ${esc(b.frequency)}</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span class="text-xs px-2 py-0.5 rounded-full font-medium ${TYPE_COLORS[b.type]||'bg-gray-100 text-gray-700'}">${esc(b.type)}</span>
          <button onclick="archiveBin('${esc(b.id)}')" class="text-gray-300 hover:text-red-400 transition-colors text-lg" title="Archiver">📦</button>
        </div>
      </div>`).join('');
}

function exportCSV() {
  const today = new Date().toISOString().slice(0,10);
  let csv = '﻿ID,Adresse,Quartier,Type,Fréquence\r\n';
  BINS.forEach(b => { csv += `"${b.id}","${b.address}","${b.neighborhood||''}","${b.type}","${b.frequency||''}"\r\n`; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv;charset=utf-8;' }));
  a.download = `laronde-poubelles-${today}.csv`;
  a.click();
  toast('⬇ Export CSV téléchargé');
}

loadAgents();
loadBins();
</script>
<style>.inp { border:1px solid #d1d5db; border-radius:0.5rem; padding:0.5rem 0.75rem; font-size:0.875rem; width:100%; outline:none; } .inp:focus { border-color:#16a34a; box-shadow:0 0 0 2px rgba(22,163,74,0.2); }</style>
</body>
</html>
